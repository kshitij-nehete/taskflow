<div class="auth-container">
      <a routerLink="/" class="back-link">← back to home</a>

      <div class="auth-card">
        <div class="terminal-hint">
          <div class="terminal-dots">
            <span class="dot dot-r"></span>
            <span class="dot dot-y"></span>
            <span class="dot dot-g"></span>
          </div>
          <span class="hint-label">auth.login</span>
        </div>

        <h1 class="auth-title">
          Welcome <span class="hl">back.</span>
        </h1>
        <p class="auth-subtitle">// sign in to continue your workflow</p>

        <div class="error-banner" *ngIf="errorMessage">
          <span class="error-prefix">[ERROR]</span> {{ errorMessage }}
        </div>

        <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" novalidate>

          <div class="form-group">
            <label for="email">EMAIL</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              [(ngModel)]="credentials.email"
              required
              email
              #emailField="ngModel"
              [class.input-error]="emailField.invalid && emailField.touched"
            >
            <div class="error-text" *ngIf="emailField.invalid && emailField.touched">
              <span *ngIf="emailField.errors?.['required']">! email required</span>
              <span *ngIf="emailField.errors?.['email']">! invalid email format</span>
            </div>
          </div>

          <div class="form-group">
            <label for="password">PASSWORD</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              [(ngModel)]="credentials.password"
              required
              minlength="6"
              #passwordField="ngModel"
              [class.input-error]="passwordField.invalid && passwordField.touched"
            >
            <div class="error-text" *ngIf="passwordField.invalid && passwordField.touched">
              <span *ngIf="passwordField.errors?.['required']">! password required</span>
              <span *ngIf="passwordField.errors?.['minlength']">! min 6 characters</span>
            </div>
          </div>

          <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading">
            {{ isLoading ? '> signing in...' : '> sign in' }}
          </button>
        </form>

        <p class="auth-footer">
          new here? <a routerLink="/auth/signup">create an account →</a>
        </p>
      </div>
    </div>
