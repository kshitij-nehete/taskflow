<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join TaskFlow today</p>

    <!-- Error message from API -->
    <div class="error-banner" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <!--
          [formGroup]="signupForm" connects this HTML form
          to the FormGroup we defined in TypeScript.
          The TypeScript FormGroup is the BOSS — HTML follows its rules.
        -->
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <!-- NAME FIELD -->
      <div class="form-group">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          formControlName="name"
          placeholder="John Doe"
          [class.input-error]="isFieldInvalid('name')"
        />
        <!--
              formControlName="name" → links this input to signupForm.get('name')
              No [(ngModel)] needed! The reactive form handles the binding.
            -->
        <div class="error-text" *ngIf="isFieldInvalid('name')">
          <span *ngIf="getFieldError('name', 'required')">Name is required</span>
          <span *ngIf="getFieldError('name', 'minlength')">Name must be at least 2 characters</span>
        </div>
      </div>

      <!-- EMAIL FIELD -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.input-error]="isFieldInvalid('email')"
        />
        <div class="error-text" *ngIf="isFieldInvalid('email')">
          <span *ngIf="getFieldError('email', 'required')">Email is required</span>
          <span *ngIf="getFieldError('email', 'email')">Please enter a valid email</span>
        </div>
      </div>

      <!-- PASSWORD FIELD -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="At least 6 characters"
          [class.input-error]="isFieldInvalid('password')"
        />
        <div class="error-text" *ngIf="isFieldInvalid('password')">
          <span *ngIf="getFieldError('password', 'required')">Password is required</span>
          <span *ngIf="getFieldError('password', 'minlength')">
            Password must be at least 6 characters
          </span>
        </div>
      </div>

      <!-- CONFIRM PASSWORD FIELD -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Re-enter your password"
          [class.input-error]="isFieldInvalid('confirmPassword')"
        />
        <div class="error-text" *ngIf="isFieldInvalid('confirmPassword')">
          <span *ngIf="getFieldError('confirmPassword', 'required')">
            Please confirm your password
          </span>
        </div>
        <!--
              Password mismatch error lives on the FORM GROUP, not the field.
              Because it compares TWO fields, it's a group-level validator.
            -->
        <div
          class="error-text"
          *ngIf="
            signupForm.errors?.['passwordMismatch'] && signupForm.get('confirmPassword')?.touched
          "
        >
          Passwords do not match
        </div>
      </div>

      <!-- SUBMIT BUTTON -->
      <button type="submit" class="btn-primary" [disabled]="signupForm.invalid || isLoading">
        {{ isLoading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <!-- LINK TO LOGIN -->
    <p class="auth-footer">
      Already have an account?
      <a routerLink="/auth/login">Sign in</a>
    </p>
  </div>
</div>
