 <header class="header">
      <div class="header-left">
        <h1 class="logo" routerLink="/dashboard">
          TaskFlow<span class="cursor"></span>
        </h1>
      </div>

      <nav class="header-nav">
        <a routerLink="/dashboard"
           routerLinkActive="nav-active"
           class="nav-link">
          <span class="nav-prefix">/</span>dashboard
        </a>
        <a routerLink="/projects"
           routerLinkActive="nav-active"
           class="nav-link">
          <span class="nav-prefix">/</span>projects
        </a>
        <a routerLink="/tasks"
           routerLinkActive="nav-active"
           class="nav-link">
          <span class="nav-prefix">/</span>tasks
        </a>
      </nav>

      <div class="header-right" *ngIf="currentUser$ | async as user">
        <div class="user-info">
          <span class="user-avatar">{{ getInitials(user.name) }}</span>
          <span class="user-name">{{ user.name }}</span>
        </div>
        <button class="btn-logout" (click)="onLogout()">
          <span class="logout-prefix">$</span> logout
        </button>
      </div>
    </header>
